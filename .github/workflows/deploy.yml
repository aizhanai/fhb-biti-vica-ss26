name: "Terraform Deploy"

on:
  workflow_dispatch: # Ermöglicht das manuelle Starten per Mausklick

jobs:
  deploy:
    name: "Exoscale Infrastructure Setup"
    runs-on: ubuntu-latest

   steps:
  - name: Checkout Source Code
    uses: actions/checkout@v4

  - name: Setup Terraform CLI
    uses: hashicorp/setup-terraform@v3
    with:
      terraform_version: 1.5.7

  - name: Terraform Init
    run: terraform init
    working-directory: ./Abgabe_2_270526

  - name: Terraform Apply (Infrastruktur aufbauen)
    run: |
      terraform apply -auto-approve \
        -var="exoscale_key=${{ secrets.EXOSCALE_API_KEY }}" \
        -var="exoscale_secret=${{ secrets.EXOSCALE_API_SECRET }}"
    working-directory: ./Abgabe_2_270526
