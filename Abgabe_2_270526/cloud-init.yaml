#cloud-config
package_update: true
package_upgrade: true

packages:
  - python3

write_files:
  - path: /opt/webserver/app.py
    owner: root:root
    permissions: '0644'
    content: |
      from http.server import SimpleHTTPRequestHandler, HTTPServer
      import os

      class MyHandler(SimpleHTTPRequestHandler):
          def do_GET(self):
              self.send_response(200)
              self.send_header("Content-type", "text/html; charset=utf-8")
              self.end_headers()
              html = "<h1>🚀 VICA Webserver läuft erfolgreich!</h1><p>Infrastruktur via Terraform & GitHub Actions bereitgestellt.</p>"
              self.wfile.write(html.encode("utf-8"))

      # WICHTIG: 0.0.0.0 sorgt dafür, dass Anfragen von AUẞEN akzeptiert werden
      server_address = ('0.0.0.0', 80)
      httpd = HTTPServer(server_address, MyHandler)
      print("Webserver läuft auf Port 80...")
      httpd.serve_forever()

  - path: /etc/systemd/system/vica-web.service
    owner: root:root
    permissions: '0644'
    content: |
      [Unit]
      Description=Python Webserver für Abgabe 2
      After=network.target

      [Service]
      Type=simple
      WorkingDirectory=/opt/webserver
      ExecStart=/usr/bin/python3 app.py
      Restart=always

      [Install]
      WantedBy=multi-user.target

runcmd:
  - mkdir -p /opt/webserver
  - systemctl daemon-reload
  - systemctl enable vica-web.service
  - systemctl start vica-web.service
